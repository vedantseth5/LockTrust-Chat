server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/locktrust;AUTO_SERVER=TRUE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: localhost
    port: 1025
    username: noreply@locktrust.io
    password:
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    time-zone: UTC

app:
  jwt:
    secret: "bG9ja3RydXN0LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1zaWduaW5nLTIwMjQ="
    access-token-expiry-ms: 604800000
    refresh-token-expiry-ms: 604800000
  otp:
    expiry-minutes: 10
    length: 6
  cors:
    allowed-origins: "http://localhost:5173"

logging:
  level:
    com.locktrust: DEBUG
    org.springframework.security: WARN
    org.springframework.web.socket: WARN
